<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصابية ومشويات علي الجد</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fdfbf9; padding: 10px; direction: rtl; margin: 0; padding-bottom: 300px; }
        .card { background: white; width: 100%; max-width: 500px; margin: auto; padding: 15px; border-radius: 20px; border: 2px solid #FF6600; }
        .header { text-align: center; color: #FF6600; font-size: 24px; font-weight: bold; border-bottom: 3px solid #FF6600; padding-bottom: 10px; margin-bottom: 20px;}
        .st { background: #2c3e50; color: white; padding: 12px; border-radius: 10px; margin: 25px 0 15px 0; font-size: 18px; border-right: 6px solid #FF6600; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .row { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-name { display: block; text-align: center; font-weight: bold; font-size: 17px; margin-bottom: 10px; color: #333; }
        .ctrl { display: flex; justify-content: space-between; align-items: center; background: #fff5ed; padding: 10px; border-radius: 12px; }
        .btn { border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 24px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .bp { background: #27ae60; } .bm { background: #e74c3c; }
        .disp { text-align: center; flex-grow: 1; }
        .wt { font-size: 14px; color: #555; display: block; font-weight: bold; }
        .pt { font-size: 16px; color: #FF6600; font-weight: bold; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: #2c3e50; color: white; padding: 15px; border-top: 4px solid #FF6600; z-index: 1000; max-width: 500px; margin: auto; }
        #cart-text { font-size: 13px; color: #f1c40f; margin-bottom: 8px; max-height: 50px; overflow-y: auto; border-bottom: 1px solid #444; text-align: right; }
        .total-line { font-size: 22px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; text-align: right; box-sizing: border-box; font-size: 16px; }
        .action-btns { display: flex; gap: 10px; flex-direction: column; }
        .wa-btn { background: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        .chat-btn { background: #075E54; color: white; border: none; width: 100%; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; display: block; line-height: 20px; }
        .call-btn { background: #007bff; color: white; border: none; width: 100%; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; display: block; line-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">🍊 قصابية ومشويات علي الجد</div>
    <div id="m-body"></div>
    <input type="text" id="c-name" placeholder="اسم الزبون الكريم">
    <input type="text" id="c-addr" placeholder="العنوان">
    <input type="text" id="c-note" placeholder="ملاحظات الطلب">
    
    <div class="action-btns">
        <button class="wa-btn" onclick="sendWA()">إرسال قائمة الطلبات ✅</button>
        <a href="https://wa.me/9647807466488?text=السلام عليكم، اريد الاستفسار عن شيء.." class="chat-btn">دردشة واستفسار 💬</a>
        <a href="tel:9647807466488" class="call-btn">إتصال مباشر 📞</a>
    </div>
</div>

<div class="footer-fixed">
    <div id="cart-text">قائمة الطلبات: فارغة</div>
    <div class="total-line"><span>المجموع:</span><span><span id="final-total">0</span> د.ع</span></div>
</div>

<script>
// الوظائف البرمجية (المحرك)
function genList(type) {
    let a = ["إختر"];
    if(type === "Q") { 
        a.push("ربع كغم", "نص كغم", "كيلو إلا ربع");
        for(let i=1; i<=50; i++) a.push(i + " كغم");
    } else if(type === "H") { 
        a.push("نص كغم", "كيلو إلا ربع");
        for(let i=1; i<=50; i++) a.push(i + " كغم");
    } else if(type === "M") {
        for(let i=1; i<=50; i++) a.push(i + " ماعون");
    } else if(type === "F") {
        for(let i=1; i<=50; i++) a.push(i + " وجبة");
    } else {
        for(let i=1; i<=50; i++) a.push(i + " قطعة");
    }
    return a;
}

var L = { M: genList("M"), Q: genList("Q"), H: genList("H"), F: genList("F"), P: genList("P") };

var items = [
    { s: "🔥 المشاوي", n: "كباب لحم (الربع المرتب)", p: 5000, t: "M" },
    { s: "🔥 المشاوي", n: "كباب لحم (نص كيلو فأكثر)", p: 9000, t: "H" },
    { s: "🔥 المشاوي", n: "كباب دجاج", p: 3000, t: "Q" },
    { s: "🔥 المشاوي", n: "كبدة شوي", p: 4000, t: "Q" },
    { s: "🔥 المشاوي", n: "كبدة بدون شوي", p: 3500, t: "Q" },
    { s: "🔥 المشاوي", n: "تكة لحم شوي", p: 5000, t: "Q" },
    { s: "🔥 المشاوي", n: "تكة لحم بدون شوي", p: 4500, t: "Q" },
    { s: "🔥 المشاوي", n: "تكة دجاج شوي", p: 3500, t: "Q" },
    { s: "🔥 المشاوي", n: "تكة دجاج بدون شوي", p: 3000, t: "Q" },
    { s: "🔥 المشاوي", n: "أجنحة شوي", p: 2500, t: "Q" },
    { s: "🔥 المشاوي", n: "أجنحة بدون شوي", p: 2000, t: "Q" },
    { s: "🔥 المشاوي", n: "عصا شوي", p: 2500, t: "Q" },
    { s: "🔥 المشاوي", n: "عصا بدون شوي", p: 2000, t: "Q" },
    { s: "🔥 المشاوي", n: "دجاجة شوي", p: 8000, t: "F" },
    { s: "🔥 المشاوي", n: "دجاجة بدون شوي", p: 7000, t: "F" },
    { s: "🥩 اللحوم", n: "لحم غنم", p: 4500, t: "Q" },
    { s: "🥩 اللحوم", n: "لحم عجل شرح", p: 3750, t: "Q" },
    { s: "🥩 اللحوم", n: "لحم عجل عظم", p: 3000, t: "Q" },
    { s: "🥩 اللحوم", n: "لحم مثروم", p: 3500, t: "Q" },
    { s: "🥩 اللحوم", n: "لية", p: 2500, t: "Q" },
    { s: "🥩 اللحوم", n: "عظم", p: 1000, t: "Q" },
    { s: "🥩 فرش 🍖", n: "دجاجة كامله 1250غم", p: 8000, t: "P" },
    { s: "🥩 فرش 🍖", n: "عصا طبل", p: 7000, t: "P" },
    { s: "🥩 فرش 🍖", n: "أفخاذ", p: 6000, t: "P" },
    { s: "🥩 فرش 🍖", n: "كبدة دجاج", p: 3000, t: "P" },
    { s: "🥩 فرش 🍖", n: "صدر دجاج", p: 7500, t: "P" },
    { s: "🥩 فرش 🍖", n: "باجة غنم", p: 20000, t: "P" },
    { s: "🥩 فرش 🍖", n: "بركر لحم", p: 8000, t: "P" },
    { s: "🥩 فرش 🍖", n: "بركر دجاج", p: 8000, t: "P" },
    { s: "🥩 فرش 🍖", n: "كبة تمن 4 قطع", p: 4000, t: "P" },
    { s: "🥩 فرش 🍖", n: "كبة مرق 4 قطع", p: 4000, t: "P" },
    { s: "🥩 فرش 🍖", n: "كاهي 3 قطع", p: 5000, t: "P" },
    { s: "🥩 فرش 🍖", n: "لسان عجل", p: 12000, t: "P" },
    { s: "🥩 فرش 🍖", n: "كراعين", p: 8000, t: "P" },
    { s: "🥩 فرش 🍖", n: "معلاك غنم", p: 18000, t: "P" },
    { s: "🥩 فرش 🍖", n: "عصائص غنم", p: 15000, t: "P" },
    { s: "🥩 فرش 🍖", n: "مخ غنم", p: 5000, t: "P" },
    { s: "🥩 فرش 🍖", n: "جلاوي غنم", p: 9000, t: "P" },
    { s: "🥩 فرش 🍖", n: "قلب عجل", p: 18000, t: "P" }
];

var cart = {};

function calc(i, q) {
    if (q === 0) return 0;
    let it = items[i];
    if (it.t === "Q") {
        if (q === 1) return it.p;
        if (q === 2) return it.p * 2;
        if (q === 3) return it.p * 3;
        return it.p * 4 * (q - 3);
    } else if (it.t === "H") {
        if (q === 1) return it.p;
        if (q === 2) return it.p * 1.5;
        return it.p * 2 * (q - 1);
    }
    return q * it.p;
}

function start() {
    let h = ""; let lastS = "";
    for (let i = 0; i < items.length; i++) {
        let it = items[i];
        if (it.s !== lastS) { h += '<div class="st">' + it.s + '</div>'; lastS = it.s; }
        if (!(i in cart)) cart[i] = 0;
        let q = cart[i];
        let txt = L[it.t][q];
        let pr = (q === 0) ? calc(i, 1) : calc(i, q);
        h += '<div class="row"><span class="item-name">'+it.n+'</span><div class="ctrl"><button class="btn bp" onclick="up('+i+',1)">+</button><div class="disp"><span class="wt">'+txt+'</span><span class="pt">'+pr.toLocaleString()+' د.ع</span></div><button class="btn bm" onclick="up('+i+',-1)">-</button></div></div>';
    }
    document.getElementById('m-body').innerHTML = h;
    update();
}

function up(i, v) { let max = L[items[i].t].length; if (cart[i]+v >= 0 && cart[i]+v < max) { cart[i]+=v; start(); } }

function update() {
    let t = 0; let list = [];
    for (let i = 0; i < items.length; i++) { 
        if (cart[i] > 0) { 
            t += calc(i, cart[i]); 
            list.push(items[i].n + " (" + L[items[i].t][cart[i]] + ")"); 
        } 
    }
    document.getElementById('final-total').innerText = t.toLocaleString();
    document.getElementById('cart-text').innerText = list.length ? list.join(" | ") : "قائمة الطلبات: فارغة";
}

function sendWA() {
    let n = document.getElementById('c-name').value; let a = document.getElementById('c-addr').value;
    if (!n || !a) return alert("يرجى إكمال الاسم والعنوان");
    let msg = "*طلب قائمة طعام من علي الجد*\n👤 الاسم: "+n+"\n📍 العنوان: "+a+"\n\n🍴 الطلبات:\n";
    for (let i = 0; i < items.length; i++) { if (cart[i] > 0) msg += "- " + items[i].n + " (" + L[items[i].t][cart[i]] + ")\n"; }
    window.open("https://wa.me/9647807466488?text=" + encodeURIComponent(msg + "\n💰 المجموع: " + document.getElementById('final-total').innerText + " د.ع"));
}
window.onload = start;
</script>
</body>
</html>
